name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      # El postinstall de la raíz hace `npm install` en los subpaquetes;
      # se omite (--ignore-scripts) y se usa `npm ci` explícito en cada uno.
      - name: Instalar dependencias (raíz)
        run: npm ci --ignore-scripts

      - name: Instalar dependencias (server)
        run: npm ci --prefix server

      - name: Instalar dependencias (client)
        run: npm ci --prefix client

      - name: Lint (server)
        run: npm run lint --prefix server

      - name: Lint (client)
        run: npm run lint --prefix client

      - name: Tests (server)
        run: npm test --prefix server

      - name: Build (client)
        run: npm run build --prefix client
